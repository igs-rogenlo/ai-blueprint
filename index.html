<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 如何改變我們的工作</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans TC','Space Grotesk',sans-serif;background:#0F172A;color:#F8FAFC}
h1,h2{font-family:'Space Grotesk','Noto Sans TC',sans-serif}
.slide{width:1920px;height:1080px;position:relative;overflow:hidden;page-break-after:always;margin:0 auto 4px}
.slide img{width:100%;height:100%;object-fit:contain}
.bg-hero{background:linear-gradient(135deg,#0F172A 0%,#1a1040 40%,#2d1b69 70%,#1a1040 100%)}
.orb{position:absolute;border-radius:50%;filter:blur(100px);opacity:0.3;pointer-events:none}
.orb-1{width:600px;height:600px;background:#667EEA;top:-200px;right:-100px}
.orb-2{width:500px;height:500px;background:#764BA2;bottom:-200px;left:-100px}
.badge{display:inline-flex;align-items:center;gap:8px;padding:8px 18px;border-radius:50px;font-size:16px;font-weight:500;background:rgba(102,126,234,0.15);color:#A5B4FC;border:1px solid rgba(102,126,234,0.2)}
.title{font-size:88px;font-weight:700;letter-spacing:-2px;line-height:1.1}
@media print{.slide{page-break-after:always;margin:0}body{background:#0F172A}}
</style>
</head>
<body>

<!-- SLIDE 1: HERO -->
<div class="slide bg-hero" style="display:flex;align-items:center;justify-content:center;text-align:center;flex-direction:column;padding:80px">
  <div class="orb orb-1"></div><div class="orb orb-2"></div>
  <div style="position:relative;z-index:1">
    <div class="badge" style="margin-bottom:32px">2026 年 3 月</div>
    <h1 class="title" style="margin-bottom:24px">AI 如何改變我們的工作</h1>
    <p style="font-size:32px;color:#94A3B8;font-weight:300">讓 AI 成為每個人的超級助手</p>
    <div style="margin-top:48px;display:flex;gap:40px;justify-content:center">
      <p style="font-size:18px;color:rgba(255,255,255,0.5)">4 個 AI Agent 已上線運行</p>
      <p style="font-size:18px;color:rgba(255,255,255,0.5)">連接 12+ 個內部系統</p>
      <p style="font-size:18px;color:rgba(255,255,255,0.5)">非技術人員也能使用</p>
    </div>
  </div>
</div>

<!-- SLIDE 2: KEYWORDS + RELATIONSHIP -->
<div class="slide"><img src="img/slide2.png" alt="AI Agent 核心概念與關係"></div>

<!-- SLIDE 3: FOUR PILLARS -->
<div class="slide"><img src="img/slide3.png" alt="四大推動方向"></div>

<!-- SLIDE 4: DATA AGENT -->
<div class="slide"><img src="img/slide4.png" alt="數據 Agent"></div>

<!-- SLIDE 5: OTHER AGENTS -->
<div class="slide"><img src="img/slide5.png" alt="其他已上線的 Agent"></div>

<!-- SLIDE 6: AI EMPOWERMENT -->
<div class="slide"><img src="img/slide6.png" alt="AI 賦能計畫"></div>

</body>
</html>
